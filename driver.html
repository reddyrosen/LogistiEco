<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dispatcher Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="c.css">
</head>
<body>

<div class="nav-brand">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3" style="min-width: 220px; min-height: 100vh; overflow-y: auto;">
        <h4 class="text-center mb-4">LogistiEco</h4>
        <hr>

        <ul class="nav flex-column">

            <li class="nav-item mb-2">
                <a href="index.html" class="nav-link text-white">Customer</a>
            </li>

            <li class="nav-item mb-2">
                <a href="dispatcher.html" class="nav-link text-white">Dispatcher</a>
            </li>

            <li class="nav-item mb-2">
                <a href="admin.html" class="nav-link text-white">Admin</a>
            </li>

            <li class="nav-item mb-2">
                <a href="driver.html" class="nav-link text-white">Driver</a>
            </li>
        </ul>
    </div>
<div class="main-content">

    <!-- TITLE -->
    <h2 class="center">Driver Dashboard</h2>

    <!-- MY DELIVERIES -->
    <div class="container glass-container">
        <h3>My Deliveries</h3>

        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Address</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#001</td>
                    <td>Cairo, Nasr City</td>
                    <td>Assigned</td>
                </tr>
                <tr>
                    <td>#002</td>
                    <td>Giza, Dokki</td>
                    <td>In Progress</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- UPDATE STATUS -->
    <div class="container glass-container">
        <h3>Update Delivery Status</h3>

        <div class="row mt-3">
            <div class="col-md-4">
                <select class="form-select">
                    <option>#001</option>
                    <option>#002</option>
                </select>
            </div>

            <div class="col-md-4">
                <select class="form-select">
                    <option>Assigned</option>
                    <option>In Progress</option>
                    <option>Delivered</option>
                </select>
            </div>

            <div class="col-md-4">
                <button class="button">Update Status</button>
            </div>
        </div>
    </div>

    <!-- PRE-TRIP CHECK -->
    <div class="container glass-container">
        <h3>Pre-Trip Safety Check</h3>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Fuel Level OK</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Vehicle Condition OK</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Documents Available</label>
        </div>

        <button class="button">Start Route</button>
    </div>

    <!-- PROOF OF DELIVERY -->
    <div class="container glass-container">
        <h3>Proof of Delivery</h3>

        <input type="file" class="form-control mb-3">

        <button class="button">Upload Proof</button>
        <br>or<br>
        <button class="button">Scan QR Code</button>
    </div>

</div>
</body>
</html>
