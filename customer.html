
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="c.css">
</head>
<body>

<div class="nav-brand">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3" style="min-width: 220px; height: 100vh; overflow-y: auto;">
        <h4 class="text-center mb-4">LogistiEco</h4>
        <hr>

        <ul class="nav flex-column">

            <li class="nav-item mb-2">
                <a href="index.html" class="nav-link text-white">Customer</a>
            </li>

            <li class="nav-item mb-2">
                <a href="dispatcher.html" class="nav-link text-white">Dispatcher</a>
            </li>

            <li class="nav-item mb-2">
                <a href="admin.html" class="nav-link text-white">Admin</a>
            </li>

            <li class="nav-item mb-2">
                <a href="driver.html" class="nav-link text-white">Driver</a>
            </li>

        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="container-fluid">

    <div class="row g-4">

        <!-- PLACE ORDER -->
        <div class="col-md-6">
            <div class="glass-container card">
                <h4>Place Order</h4>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Delivery Address</label>
                        <input type="text" class="form-control" placeholder="Enter address">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Delivery Preferences</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Select a delivery preference</option>
                            <option value="quiet">Quiet Drop-off</option>
                            <option value="express">Express Delivery (2-3 days)</option>
                            <option value="overnight">Overnight Delivery</option>
                            <option value="scheduled">Scheduled Delivery</option>
                            <option value="pickup">Neighbor Pickup</option>
                        </select>
                    </div>

                    <button class="button">Submit Order</button>
                </form>
            </div>
        </div>

        <!-- TRACK ORDER -->
        <div class="col-md-6">
            <div class="glass-container card">
                <h4>Track Order</h4>

                <div class="mb-3">
                    <label class="form-label">Order ID</label>
                    <input type="text" class="form-control" placeholder="Enter order ID">
                </div>

                <button class="button" onclick="toggleStatus()">Check Status</button>

                <div class="alert glass-container" id="statusAlert" style="display:none; margin-top: 15px; padding: 15px; border: 1px solid rgba(177, 149, 47, 0.5); background: rgba(52, 52, 40, 0.15);">
                    <strong style="color: gold;">Status:</strong> <span style="color: wheat;">Pending</span>
                </div>
            </div>
        </div>

        <!-- FEEDBACK -->
        <div class="col-12">
            <div class="glass-container card">
                <h4>Submit Feedback</h4>

                <textarea class="form-control mb-3" rows="3" placeholder="Write your feedback..."></textarea>

                <button class="button">Submit Feedback</button>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleStatus() {
        const statusAlert = document.getElementById('statusAlert');
        statusAlert.style.display = statusAlert.style.display === 'none' ? 'block' : 'none';
    }
</script>

</body>

</html>
